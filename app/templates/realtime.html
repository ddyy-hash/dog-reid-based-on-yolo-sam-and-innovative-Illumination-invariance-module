{% extends "base.html" %}
{% block title %}实时检测{% endblock %}
{% block content %}
<div class="realtime-container">
    <h1>实时狗识别系统</h1>

    <!-- 控制面板 -->
    <div class="control-panel">
        <!-- RTSP摄像头输入区域 -->
        <div class="input-group" id="rtspGroup">
            <label for="rtspUrl">RTSP摄像头地址：</label>
            <input type="text" id="rtspUrl"
                   value="rtsp://admin:admin123@47.116.205.233:6237/cam/realmonitor?channel=1&subtype=1"
                   placeholder="输入RTSP地址">
        </div>
          <!-- 本地摄像头选择区域 -->
        <div class="input-group" id="localGroup" style="display: none;">
            <label for="localCamera">选择本地摄像头：</label>
            <select id="localCamera">
                <option value="">正在获取摄像头列表...</option>
            </select>
            <div class="camera-preview">
                <video id="localPreview" autoplay muted style="width: 200px; height: 150px; display: none;"></video>
            </div>
        </div>

         <!-- 帧流模式 -->
        <div class="input-group" id="frameStreamGroup" style="display: none;">
            <label>帧流模式：</label>
            <p class="mode-description">使用浏览器摄像头，将视频帧发送到后端处理</p>
            <div class="camera-preview" id="framePreviewContainer" style="display: none;">
                <video id="frameStreamPreview" autoplay muted playsinline
                       style="width: 100%; max-width: 400px;"></video>
                <canvas id="frameCanvas" style="display: none;"></canvas>
                <div class="preview-status">
                    <span id="frameStreamStatus">准备中...</span>
                    <span id="frameRateCounter">0 FPS</span>
                </div>
            </div>
        </div>

        <div class="button-group">
        <button id="useLocalCameraBtn" onclick="toggleCameraType()" class="btn-secondary">
            <i class="icon-camera"></i> 使用本地摄像头
        </button>
        <button id="startBtn" onclick="startDetection()" class="btn-primary">
            <i class="icon-play"></i> 开始检测
        </button>
        <button id="stopBtn" onclick="stopDetection()" class="btn-danger" disabled>
            <i class="icon-stop"></i> 停止检测
        </button>
    </div>
    </div>

    <!-- 状态指示器 -->
    <div class="status-panel">
        <div id="connectionStatus" class="status-item">
            <span class="status-label">连接状态：</span>
            <span id="connectionIndicator" class="status-disconnected">未连接</span>
        </div>
        <div id="detectionStatus" class="status-item">
            <span class="status-label">检测状态：</span>
            <span id="detectionIndicator" class="status-idle">待机</span>
        </div>
    </div>

    <!-- 视频流和结果展示 -->
    <div class="main-content">
        <!-- 视频流区域 -->
        <div class="video-section">
            <h3>实时视频流</h3>
            <div class="video-container">
                <img id="videoStream" src="" alt="视频流" style="display: none;">
                <div id="videoPlaceholder" class="video-placeholder">
                    <i class="icon-camera"></i>
                    <p>点击开始检测以查看视频流</p>
                </div>
            </div>
        </div>

        <!-- 检测结果区域 -->
        <div class="results-section">
            <h3>识别结果</h3>
            <div id="currentResult" class="highlight-result">
                <div class="no-result">暂无检测结果</div>
            </div>
            <div class="result-list" id="resultList"></div>
        </div>
    </div>

    <!-- 系统监控面板 -->
    <div class="monitoring-panel" id="monitoringPanel" style="display: none;">
        <h3>系统状态监控</h3>
        <div class="monitor-grid">
            <div class="monitor-item">
                <span class="monitor-label">CPU使用率：</span>
                <span id="cpuUsage">--</span>
            </div>
            <div class="monitor-item">
                <span class="monitor-label">内存使用率：</span>
                <span id="memoryUsage">--</span>
            </div>
            <div class="monitor-item">
                <span class="monitor-label">GPU状态：</span>
                <span id="gpuStatus">--</span>
            </div>
            <div class="monitor-item">
                <span class="monitor-label">处理帧率：</span>
                <span id="processingFps">--</span>
            </div>
        </div>
    </div>
</div>

<script>
let isPolling = false;
let statusCheckInterval = null;
let performanceInterval = null;
let localStream = null;
let selectedCameraType = 'rtsp'; // 默认使用RTSP
let availableCameras = [];
let isLocalCameraMode = false;
let frameStreamMode = false;
let frameInterval = null;
let frameCanvas = null;
let frameContext = null;
let frameStreamInterval = null;
let frameStreamActive = false;
let frameTimes = [];
let lastFrameTime = null;

// 状态管理
const AppState = {
    isDetecting: false,
    isConnected: false,
    lastResultTime: null
};

// 页面加载时初始化
document.addEventListener('DOMContentLoaded', function() {
    initializeCameraSystem();
    startFpsCounter();
});

// 启动FPS计数器
function startFpsCounter() {
    function updateFps() {
        if (!frameStreamActive) return;

        const now = performance.now();
        if (lastFrameTime) {
            const delta = now - lastFrameTime;
            frameTimes.push(delta);
            if (frameTimes.length > 10) frameTimes.shift();

            const avgDelta = frameTimes.reduce((a, b) => a + b, 0) / frameTimes.length;
            const fps = Math.round(1000 / avgDelta);
            document.getElementById('frameRateCounter').textContent = `${fps} FPS`;
            document.getElementById('processingFps').textContent = `${fps} FPS`;
        }
        lastFrameTime = now;
        requestAnimationFrame(updateFps);
    }
    requestAnimationFrame(updateFps);
}

// 初始化摄像头系统
async function initializeCameraSystem() {
    try {
        // 请求摄像头权限
        await navigator.mediaDevices.getUserMedia({ video: true });
        await getLocalCameras();
    } catch (error) {
        console.error('摄像头权限获取失败:', error);
        showError('无法访问摄像头权限，请检查浏览器设置');
    }

    // 初始化本地摄像头选择变化事件
    document.getElementById('localCamera').addEventListener('change', function() {
        if (this.value) {
            startLocalPreview(this.value);
        } else {
            stopLocalPreview();
        }
    });
}

// 切换摄像头类型的主函数
function toggleCameraType() {
    const rtspGroup = document.getElementById('rtspGroup');
    const localGroup = document.getElementById('localGroup');
    const frameStreamGroup = document.getElementById('frameStreamGroup');
    const toggleBtn = document.getElementById('useLocalCameraBtn');

    if (selectedCameraType === 'rtsp') {
        // 切换到本地摄像头模式
        selectedCameraType = 'local';
        rtspGroup.style.display = 'none';
        localGroup.style.display = 'block';
        frameStreamGroup.style.display = 'none';
        toggleBtn.innerHTML = '<i class="icon-video"></i> 使用帧流模式';
        getLocalCameras();
    } else if (selectedCameraType === 'local') {
        // 切换到帧流模式
        selectedCameraType = 'frame_stream';
        frameStreamMode = true;
        rtspGroup.style.display = 'none';
        localGroup.style.display = 'none';
        frameStreamGroup.style.display = 'block';
        toggleBtn.innerHTML = '<i class="icon-upload"></i> 使用RTSP摄像头';
        initFrameStreamMode();
    } else {
        // 切换回RTSP模式
        selectedCameraType = 'rtsp';
        frameStreamMode = false;
        rtspGroup.style.display = 'block';
        localGroup.style.display = 'none';
        frameStreamGroup.style.display = 'none';
        toggleBtn.innerHTML = '<i class="icon-camera"></i> 使用本地摄像头';
        stopFrameStreamMode();
    }
}

// 初始化帧流模式
async function initFrameStreamMode() {
    try {
        // 请求摄像头权限
        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                width: { ideal: 640 },
                height: { ideal: 480 }
            }
        });

        const video = document.getElementById('frameStreamPreview');
        video.srcObject = stream;
        video.style.display = 'block';
        video.play();

        // 初始化Canvas
        frameCanvas = document.getElementById('frameCanvas');
        frameContext = frameCanvas.getContext('2d');
        frameCanvas.width = 640;
        frameCanvas.height = 480;

        if (!frameCanvas) {
        frameCanvas = document.createElement('canvas');
        frameCanvas.id = 'frameCanvas';
        document.body.appendChild(frameCanvas);
        frameContext = frameCanvas.getContext('2d');
        frameCanvas.width = 640;
        frameCanvas.height = 480;
        frameCanvas.style.display = 'none';
    }

        // 显示预览
        document.getElementById('framePreviewContainer').style.display = 'block';
        document.getElementById('frameStreamStatus').textContent = '已连接';

        showSuccess('帧流模式初始化成功');
        return true;
    } catch (error) {
        showError(`无法访问摄像头: ${error.message}`);
        return false;
    }
}

// 开始帧流检测
async function startFrameStreamDetection() {
    if (!frameCanvas || !frameContext) {
        const success = await initFrameStreamMode();
        if (!success) return;
    }

    // 停止其他检测模式
    stopDetection();

    // 更新UI状态
    updateUI('starting');
    document.getElementById('connectionIndicator').textContent = '已连接';
    document.getElementById('connectionIndicator').className = 'status-connected';
    document.getElementById('detectionIndicator').textContent = '检测中';
    document.getElementById('detectionIndicator').className = 'status-detecting';

    // 设置帧捕获间隔（约5fps）
    frameStreamActive = true;
    frameStreamInterval = setInterval(captureAndSendFrame, 200); // 每200ms发送一帧（5fps）

    // 显示视频流区域
    document.getElementById('videoPlaceholder').style.display = 'none';

    AppState.isDetecting = true;
    updateUI('running');
    startPolling(); // 复用现有的结果轮询
    startPerformanceMonitoring();
    showSuccess('帧流检测已启动');
}

// 捕获并发送帧
function captureAndSendFrame() {
    if (!frameStreamActive) return;

    const video = document.getElementById('frameStreamPreview');

    if (video.videoWidth === 0 || video.videoHeight === 0) {
        return; // 视频还未准备好
    }

    // 更新帧时间
    const now = performance.now();
    frameTimes.push(now - (lastFrameTime || now));
    if (frameTimes.length > 10) frameTimes.shift();
    lastFrameTime = now;

    // 绘制视频帧到Canvas
    frameContext.drawImage(video, 0, 0, frameCanvas.width, frameCanvas.height);

    // 转换为JPEG并压缩（质量80%）
    const frameData = frameCanvas.toDataURL('image/jpeg', 0.8);

    // 发送到后端
    fetch('/process_frame', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            frame_data: frameData,
            timestamp: Date.now()
        })
    }).catch(error => {
        console.error('帧发送失败:', error);
        showError('帧发送失败，请检查网络连接');
    });
}

// 停止帧流检测
function stopFrameStreamMode() {
    if (frameStreamInterval) {
        clearInterval(frameStreamInterval);
        frameStreamInterval = null;
    }

    frameStreamActive = false;

    const video = document.getElementById('frameStreamPreview');
    if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
        video.srcObject = null;
        video.style.display = 'none';
    }

    document.getElementById('framePreviewContainer').style.display = 'none';

    // 更新状态显示
    document.getElementById('connectionIndicator').textContent = '未连接';
    document.getElementById('connectionIndicator').className = 'status-disconnected';
    document.getElementById('detectionIndicator').textContent = '待机';
    document.getElementById('detectionIndicator').className = 'status-idle';

    // 显示视频占位符
    document.getElementById('videoPlaceholder').style.display = 'flex';
}

// 获取本地摄像头列表
async function getLocalCameras() {
    try {
        // 先请求权限
        await navigator.mediaDevices.getUserMedia({ video: true });

        const devices = await navigator.mediaDevices.enumerateDevices();
        const videoDevices = devices.filter(device => device.kind === 'videoinput');

        const select = document.getElementById('localCamera');
        select.innerHTML = '<option value="">请选择摄像头</option>';

        availableCameras = videoDevices;
        videoDevices.forEach((device, index) => {
            const option = document.createElement('option');
            option.value = device.deviceId;
            option.textContent = device.label || `摄像头 ${index + 1}`;
            select.appendChild(option);
        });

        if (videoDevices.length === 0) {
            select.innerHTML = '<option value="">未找到可用摄像头</option>';
            showError('未检测到本地摄像头设备');
        } else {
            showSuccess(`发现 ${videoDevices.length} 个摄像头设备`);
        }
    } catch (error) {
        console.error('获取摄像头列表失败:', error);
        const select = document.getElementById('localCamera');
        select.innerHTML = '<option value="">摄像头权限被拒绝</option>';
        showError('获取摄像头权限失败：' + error.message);
    }
}

// 启动本地摄像头预览
async function startLocalPreview(deviceId) {
    try {
        stopLocalPreview(); // 先停止之前的预览

        const constraints = {
            video: {
                deviceId: deviceId ? { exact: deviceId } : undefined,
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        };

        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        const preview = document.getElementById('localPreview');
        preview.srcObject = localStream;
        preview.style.display = 'block';

        showSuccess('摄像头预览已启动');
    } catch (error) {
        console.error('启动摄像头预览失败:', error);
        showError('无法启动摄像头预览: ' + error.message);
    }
}

// 停止本地摄像头预览
function stopLocalPreview() {
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;

        const preview = document.getElementById('localPreview');
        preview.srcObject = null;
        preview.style.display = 'none';
    }
}


// 开始检测函数
function startDetection() {
    if (selectedCameraType === 'frame_stream') {
        startFrameStreamDetection();
    } else if (selectedCameraType === 'rtsp') {
        startRTSPDetection();
    } else {
        startLocalDetection();
    }
}

// RTSP 检测
function startRTSPDetection() {
    const rtspUrl = document.getElementById('rtspUrl').value.trim();
    if (!rtspUrl) {
        showError('请输入有效的RTSP地址');
        return;
    }

    updateUI('starting');

    fetch('/start_realtime', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: `rtsp_url=${encodeURIComponent(rtspUrl)}`
    })
    .then(response => {
        if (!response.ok) throw new Error('启动失败');
        return response.json();
    })
    .then(data => {
        AppState.isDetecting = true;
        updateUI('running');
        startPolling();
        startVideoStream();
        startPerformanceMonitoring();
        showSuccess('RTSP检测已启动');
    })
    .catch(error => {
        console.error('启动RTSP检测失败:', error);
        showError('启动RTSP检测失败：' + error.message);
        updateUI('stopped');
    });
}

// 本地摄像头检测
async function startLocalDetection() {
    const selectedCamera = document.getElementById('localCamera').value;
    if (!selectedCamera) {
        showError('请选择本地摄像头');
        return;
    }

    // 停止本地预览
    stopLocalPreview();

    // 更新UI状态
    updateUI('starting');
    document.getElementById('connectionIndicator').textContent = '连接中...';
    document.getElementById('connectionIndicator').className = 'status-connecting';
    document.getElementById('detectionIndicator').textContent = '启动中';
    document.getElementById('detectionIndicator').className = 'status-starting';

    // 发送本地摄像头检测请求
    fetch('/start_local_detection', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            camera_id: selectedCamera,
            camera_type: 'local'
        })
    })
    .then(response => {
        if (!response.ok) throw new Error('启动失败');
        return response.json();
    })
    .then(data => {
        AppState.isDetecting = true;
        updateUI('running');
        startPolling();
        startLocalVideoStream();  // 确保调用视频流启动函数
        startPerformanceMonitoring();
        showSuccess('本地摄像头检测已启动');

        // 更新状态显示
        document.getElementById('connectionIndicator').textContent = '已连接';
        document.getElementById('connectionIndicator').className = 'status-connected';
        document.getElementById('detectionIndicator').textContent = '检测中';
        document.getElementById('detectionIndicator').className = 'status-detecting';
    })
    .catch(error => {
        console.error('启动本地检测失败:', error);
        showError('启动本地检测失败：' + error.message);
        updateUI('stopped');

        // 更新状态显示
        document.getElementById('connectionIndicator').textContent = '连接失败';
        document.getElementById('connectionIndicator').className = 'status-disconnected';
        document.getElementById('detectionIndicator').textContent = '启动失败';
        document.getElementById('detectionIndicator').className = 'status-error';
    });
}

// 本地摄像头视频流
function startLocalVideoStream() {
    const videoElement = document.getElementById('videoStream');
    const placeholder = document.getElementById('videoPlaceholder');

    // 确保视频元素可见
    videoElement.style.display = 'block';
    placeholder.style.display = 'none';

    // 从服务器获取处理后的视频流
    videoElement.src = '/local_camera_stream';

    // 添加错误处理
    videoElement.onerror = function() {
        console.warn('本地视频流加载失败');
        videoElement.style.display = 'none';
        placeholder.style.display = 'flex';
        placeholder.innerHTML = '<i class="icon-warning"></i><p>本地视频流连接失败</p>';

        // 更新状态显示
        document.getElementById('connectionIndicator').textContent = '连接失败';
        document.getElementById('connectionIndicator').className = 'status-disconnected';
    };

    // 添加加载成功处理
    videoElement.onloadeddata = function() {
        console.log('本地视频流加载成功');
        document.getElementById('connectionIndicator').textContent = '已连接';
        document.getElementById('connectionIndicator').className = 'status-connected';
    };
}

// 停止本地视频流
function stopLocalVideoStream() {
    const videoElement = document.getElementById('videoStream');
    const placeholder = document.getElementById('videoPlaceholder');

    // 重置视频源
    videoElement.src = '';
    videoElement.style.display = 'none';
    placeholder.style.display = 'flex';
    placeholder.innerHTML = '<i class="icon-camera"></i><p>点击开始检测以查看视频流</p>';
}

// 停止检测函数
function stopDetection() {
    updateUI('stopping');

    if (selectedCameraType === 'frame_stream') {
        if (frameInterval) {
            clearInterval(frameInterval);
            frameInterval = null;
        }
        if (frameStreamActive) {
            stopFrameStreamMode();
        }
        AppState.isDetecting = false;
        stopPolling();
        updateUI('stopped');
        clearResults();
        stopPerformanceMonitoring();
        showInfo('帧流检测已停止');
    } else {
        // 原有的停止逻辑
        const endpoint = selectedCameraType === 'rtsp' ? '/stop_realtime' : '/stop_local_detection';

        fetch(endpoint, { method: 'POST' })
        .then(response => response.json())
        .then(data => {
            AppState.isDetecting = false;
            AppState.isConnected = false;
            stopPolling();

            if (selectedCameraType === 'local') {
                stopLocalVideoStream();
            } else {
                stopVideoStream();
            }

            updateUI('stopped');
            clearResults();
            stopPerformanceMonitoring();
            showInfo('检测已停止');
        })
        .catch(error => {
            console.error('停止检测失败:', error);
            updateUI('stopped');
        });
    }
}


function startPolling() {
    if (isPolling) return;
    isPolling = true;
    pollResults();

    // 状态检查
    statusCheckInterval = setInterval(checkConnectionStatus, 3000);
}

function stopPolling() {
    isPolling = false;
    if (statusCheckInterval) {
        clearInterval(statusCheckInterval);
        statusCheckInterval = null;
    }
}

function pollResults() {
    if (!isPolling) return;

    fetch('/get_realtime_results')
    .then(response => response.json())
    .then(data => {
        if (data.results && Object.keys(data.results).length > 0) {
            updateResults(data.results);
            AppState.lastResultTime = Date.now();
        }

        if (isPolling) {
            setTimeout(pollResults, 1000);
        }
    })
    .catch(error => {
        console.error('获取结果失败:', error);
        if (isPolling) {
            setTimeout(pollResults, 2000);
        }
    });
}

function checkConnectionStatus() {
    fetch('/camera_status')
    .then(response => response.json())
    .then(data => {
        AppState.isConnected = data.is_running && data.connected;
        updateConnectionStatus(data);
    })
    .catch(error => {
        console.error('状态检查失败:', error);
        AppState.isConnected = false;
        updateConnectionStatus({connected: false, error_message: '网络错误'});
    });
}

function startVideoStream() {
    const videoElement = document.getElementById('videoStream');
    const placeholder = document.getElementById('videoPlaceholder');

    videoElement.src = '/camera_stream';
    videoElement.style.display = 'block';
    placeholder.style.display = 'none';

    videoElement.onerror = function() {
        console.warn('视频流加载失败');
        videoElement.style.display = 'none';
        placeholder.style.display = 'flex';
        placeholder.innerHTML = '<i class="icon-warning"></i><p>视频流连接失败</p>';
    };
}

function stopVideoStream() {
    const videoElement = document.getElementById('videoStream');
    const placeholder = document.getElementById('videoPlaceholder');

    videoElement.src = '';
    videoElement.style.display = 'none';
    placeholder.style.display = 'flex';
    placeholder.innerHTML = '<i class="icon-camera"></i><p>点击开始检测以查看视频流</p>';
}

function startPerformanceMonitoring() {
    document.getElementById('monitoringPanel').style.display = 'block';
    performanceInterval = setInterval(updatePerformanceData, 5000);
    updatePerformanceData();
}

function stopPerformanceMonitoring() {
    document.getElementById('monitoringPanel').style.display = 'none';
    if (performanceInterval) {
        clearInterval(performanceInterval);
        performanceInterval = null;
    }
}

function updatePerformanceData() {
    fetch('/system_performance')
    .then(response => response.json())
    .then(data => {
        document.getElementById('cpuUsage').textContent = data.cpu_usage + '%';
        document.getElementById('memoryUsage').textContent = data.memory_usage + '%';
        document.getElementById('gpuStatus').textContent = data.gpu_available ?
            `可用 (${data.gpu_memory_used}/${data.gpu_memory_total})` : '不可用';
    })
    .catch(error => console.error('性能数据获取失败:', error));
}


function updateResults(results) {
    if (!results || Object.keys(results).length === 0) {
        document.getElementById('currentResult').innerHTML =
            '<div class="no-result">暂无检测结果</div>';
        return;
    }

    const topResult = getTopResult(results);
    const currentResultDiv = document.getElementById('currentResult');
    const resultList = document.getElementById('resultList');

    if (topResult && topResult.confidence > 0) {
        currentResultDiv.innerHTML = `
            <div class="result-highlight">
                <div class="result-name">${topResult.name}</div>
                <div class="result-confidence">${topResult.confidence.toFixed(1)}%</div>
                <div class="result-time">${new Date().toLocaleTimeString()}</div>
            </div>
        `;
    }

    // 修复结果列表显示
    const sortedResults = Object.entries(results)
        .sort(([,a], [,b]) => b.confidence - a.confidence);

    resultList.innerHTML = sortedResults.map(([id, data]) => `
        <div class="result-item ${data.confidence === topResult.confidence ? 'top-result' : ''}">
            <span class="result-name">${data.name}</span>
            <span class="result-confidence">${data.confidence.toFixed(1)}%</span>
            <div class="confidence-bar">
                <div class="confidence-fill" style="width: ${data.confidence}%"></div>
            </div>
        </div>
    `).join('');
}


function updateConnectionStatus(data) {
    const indicator = document.getElementById('connectionIndicator');
    const detectionIndicator = document.getElementById('detectionIndicator');

    if (data.connected && AppState.isDetecting) {
        indicator.textContent = '已连接';
        indicator.className = 'status-connected';
        detectionIndicator.textContent = '检测中';
        detectionIndicator.className = 'status-detecting';
    } else if (AppState.isDetecting) {
        indicator.textContent = '连接中...';
        indicator.className = 'status-connecting';
        detectionIndicator.textContent = '启动中';
        detectionIndicator.className = 'status-starting';
    } else {
        indicator.textContent = '未连接';
        indicator.className = 'status-disconnected';
        detectionIndicator.textContent = '待机';
        detectionIndicator.className = 'status-idle';
    }

    if (data.error_message) {
        showError('连接错误：' + data.error_message);
    }
}

function updateUI(state) {
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const rtspInput = document.getElementById('rtspUrl');

    switch(state) {
        case 'starting':
            startBtn.disabled = true;
            startBtn.innerHTML = '<i class="icon-loading"></i> 启动中...';
            stopBtn.disabled = false;
            rtspInput.disabled = true;
            break;
        case 'running':
            startBtn.disabled = true;
            startBtn.innerHTML = '<i class="icon-play"></i> 检测中';
            stopBtn.disabled = false;
            rtspInput.disabled = true;
            break;
        case 'stopping':
            stopBtn.disabled = true;
            stopBtn.innerHTML = '<i class="icon-loading"></i> 停止中...';
            break;
        case 'stopped':
            startBtn.disabled = false;
            startBtn.innerHTML = '<i class="icon-play"></i> 开始检测';
            stopBtn.disabled = true;
            stopBtn.innerHTML = '<i class="icon-stop"></i> 停止检测';
            rtspInput.disabled = false;
            break;
    }
}

function getTopResult(results) {
    if (!results || Object.keys(results).length === 0) return null;
    return Object.values(results).reduce((top, current) =>
        (current.confidence > top.confidence) ? current : top,
        { confidence: 0 }
    );
}

function clearResults() {
    document.getElementById('currentResult').innerHTML = '<div class="no-result">暂无检测结果</div>';
    document.getElementById('resultList').innerHTML = '';
}

// 通知系统
function showSuccess(message) {
    showNotification(message, 'success');
}

function showError(message) {
    showNotification(message, 'error');
}

function showInfo(message) {
    showNotification(message, 'info');
}

function showNotification(message, type) {
    const notification = document.createElement('div');
    notification.className = `notification notification-${type}`;
    notification.innerHTML = `
        <span>${message}</span>
        <button onclick="this.parentElement.remove()">×</button>
    `;

    document.body.appendChild(notification);

    setTimeout(() => {
        if (notification.parentElement) {
            notification.remove();
        }
    }, 5000);
}

// 页面卸载时清理资源
window.addEventListener('beforeunload', function() {
    if (frameStreamActive) {
        stopFrameStreamMode();
    }
    if (AppState.isDetecting) {
        stopDetection();
    }
    stopLocalPreview();
});

</script>
